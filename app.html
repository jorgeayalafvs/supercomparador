<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SuperComparador Paraguay</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f2f2f2;
margin:0;
padding:20px;
max-width:700px;
margin:auto;
}
.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
margin-bottom:15px;
}
input{
width:100%;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:8px;
margin-bottom:10px;
}
button{
width:100%;
padding:12px;
background:#1B6B3A;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}
.item{
padding:10px;
border-bottom:1px solid #eee;
}
.ok{color:green;font-weight:bold;}
.err{color:#999;}
</style>
</head>
<body>

<div class="card">
<h2>🛒 SuperComparador Paraguay</h2>
<input id="barcode" placeholder="Código de barras">
<button onclick="buscar()">Buscar Precio</button>
</div>

<div id="resultado"></div>

<script>
async function buscar(){

let code=document.getElementById("barcode").value.trim();

if(!code)return;

document.getElementById("resultado").innerHTML=
'<div class="card">Buscando...</div>';

let r=await fetch("/buscar?barcode="+code);
let data=await r.json();

let html='<div class="card">';

html+='<h3>Resultados</h3>';

data.resultados.forEach(x=>{

html+='<div class="item">';

html+='<b>'+x.supermercado+'</b><br>';

if(x.disponible){
html+='<span class="ok">Gs. '+Math.round(x.precio).toLocaleString()+'</span>';
}else{
html+='<span class="err">'+x.error+'</span>';
}

html+='</div>';

});

html+='</div>';

document.getElementById("resultado").innerHTML=html;

}
</script>

</body>
</html>
